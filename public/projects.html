<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><h2>⚡ TaskFlow</h2></div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="/projects.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Projects
        </a>
      </nav>
      <div class="sidebar-footer">
        <div id="sidebarAvatar" class="user-avatar">?</div>
        <div class="user-info"><div id="sidebarName" class="name">User</div><div id="sidebarEmail" class="email">email</div></div>
        <button id="logoutBtn" class="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <button id="mobileToggle" class="mobile-toggle">☰</button>
      <div class="page-header">
        <div><h1>Projects</h1><p>Manage your team projects</p></div>
        <button id="createProjectBtn" class="btn btn-primary">+ New Project</button>
      </div>
      <div id="projectsGrid" class="projects-grid"><div class="spinner"></div></div>
    </main>
  </div>

  <!-- Create Project Modal -->
  <div id="createProjectModal" class="modal-overlay" onclick="if(event.target===this)closeModal('createProjectModal')">
    <div class="modal">
      <div class="modal-header">
        <h2>Create Project</h2>
        <button class="modal-close" onclick="closeModal('createProjectModal')">&times;</button>
      </div>
      <form id="createProjectForm">
        <div class="form-group">
          <label for="projectName">Project Name</label>
          <input type="text" id="projectName" class="form-control" placeholder="My Awesome Project" required minlength="2">
        </div>
        <div class="form-group">
          <label for="projectDesc">Description</label>
          <textarea id="projectDesc" class="form-control" placeholder="What's this project about?" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('createProjectModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Project Detail Modal -->
  <div id="projectDetailModal" class="modal-overlay" onclick="if(event.target===this)closeModal('projectDetailModal')">
    <div class="modal">
      <div class="modal-header">
        <h2 id="detailProjectName">Project</h2>
        <button class="modal-close" onclick="closeModal('projectDetailModal')">&times;</button>
      </div>
      <p id="detailProjectDesc" style="color:var(--text-muted);margin-bottom:20px"></p>

      <h3 style="font-size:0.9rem;margin-bottom:12px">Members</h3>
      <div id="membersList" class="members-list" style="margin-bottom:20px"></div>

      <!-- Admin: Add member -->
      <div id="adminSection">
        <h3 style="font-size:0.9rem;margin-bottom:12px">Add Member</h3>
        <form id="addMemberForm" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
          <input type="email" id="memberEmail" class="form-control" style="flex:1;min-width:180px" placeholder="user@email.com" required>
          <select id="memberRole" class="form-control" style="width:auto">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
          <button type="submit" class="btn btn-primary btn-sm">Add</button>
        </form>
      </div>

      <div class="modal-actions">
        <button id="deleteProjectBtn" class="btn btn-danger">Delete Project</button>
        <button id="viewTasksBtn" class="btn btn-primary">View Tasks →</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/projects.js"></script>
</body>
</html>
