<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Team Task Manager - Collaborate, manage projects, and track tasks efficiently with your team.">
  <title>TaskFlow — Team Task Manager</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <!-- LOGIN -->
      <div id="loginSection" class="auth-card">
        <div class="auth-logo">
          <h1>⚡ TaskFlow</h1>
          <p>Sign in to your account</p>
        </div>
        <div id="loginError" class="auth-error"></div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">Sign In</button>
        </form>
        <div class="auth-toggle">
          Don't have an account? <a id="showSignup" href="#">Sign Up</a>
        </div>
      </div>

      <!-- SIGNUP -->
      <div id="signupSection" class="auth-card" style="display:none">
        <div class="auth-logo">
          <h1>⚡ TaskFlow</h1>
          <p>Create your account</p>
        </div>
        <div id="signupError" class="auth-error"></div>
        <form id="signupForm">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" class="form-control" placeholder="John Doe" required minlength="2">
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" class="form-control" placeholder="Min 6 characters" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">Create Account</button>
        </form>
        <div class="auth-toggle">
          Already have an account? <a id="showLogin" href="#">Sign In</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
