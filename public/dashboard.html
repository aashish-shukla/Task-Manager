<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TaskFlow</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header"><h2>⚡ TaskFlow</h2></div>
      <nav class="sidebar-nav">
        <a href="/dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </a>
        <a href="/projects.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
          Projects
        </a>
      </nav>
      <div class="sidebar-footer">
        <div id="sidebarAvatar" class="user-avatar">?</div>
        <div class="user-info"><div id="sidebarName" class="name">User</div><div id="sidebarEmail" class="email">email</div></div>
        <button id="logoutBtn" class="logout-btn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">
      <button id="mobileToggle" class="mobile-toggle">☰</button>
      <div class="page-header">
        <div><h1>Dashboard</h1><p>Overview of your tasks and projects</p></div>
      </div>

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card purple">
          <div class="stat-icon">📊</div>
          <div class="stat-value" id="totalTasks">0</div>
          <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-icon">🔄</div>
          <div class="stat-value" id="inProgressCount">0</div>
          <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card green">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="completedCount">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card orange">
          <div class="stat-icon">⚠️</div>
          <div class="stat-value" id="overdueCount">0</div>
          <div class="stat-label">Overdue</div>
        </div>
      </div>

      <div style="margin-bottom:12px;font-size:0.9rem;color:var(--text-secondary)">📁 <span id="projectCount">0</span> Projects</div>

      <!-- CHARTS -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>Task Status Distribution</h3>
          <div style="height:280px"><canvas id="statusChart"></canvas></div>
        </div>
        <div class="chart-card">
          <h3>Tasks Per User</h3>
          <div style="height:280px"><canvas id="userChart"></canvas></div>
        </div>
      </div>

      <!-- OVERDUE + RECENT -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>⚠️ Overdue Tasks</h3>
          <div id="overdueList"></div>
        </div>
        <div class="chart-card">
          <h3>🕐 Recent Activity</h3>
          <div id="recentList"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
